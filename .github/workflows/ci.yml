name: CI

on:
  push:
    branches: [master, quizen-rewrite]
  pull_request:
    branches: [master]

# Cancel in-flight runs of the same ref so a fast follow-up push doesn't
# leave a stale build pending — saves Actions minutes on busy PRs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          # The build does NOT require live services — the env loader
          # is lazy (see src/lib/env.ts). These dummy values keep any
          # eager imports that happen to read NEXT_PUBLIC_* from
          # blowing up if we add validation later.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build
