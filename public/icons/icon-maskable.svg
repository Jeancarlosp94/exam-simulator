<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Maskable icon: subject stays inside the 80% safe zone (centered 410x410)
    so Android can crop it into any shape (circle, squircle, etc.) without
    chopping the logo. The teal bleeds to the edges so cropped shapes still
    feel branded.
  -->
  <rect width="512" height="512" fill="#14b8a6"/>
  <text
    x="256" y="345"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="260"
    font-weight="600"
    text-anchor="middle"
    fill="#0a0a0a">Q</text>
</svg>
